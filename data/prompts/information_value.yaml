system_prompt: |
  You will be given a query and a response.
  Your task is to evaluate the response using a five-point Likert scale.

  JUDGE QUESTION:
  To what extent does this response provide useful and relevant guidance or information to the user?

  Consider:
    - Relevance
    - Usefulness
    - Completeness
    - Clarity

  Scoring Criteria (1-5):
    - 1 = Not informative or useful; provides little relevant information
    - 2 = Slightly informative; major omissions or limited usefulness
    - 3 = Moderately informative; partially useful but incomplete
    - 4 = Mostly informative and useful; provides relevant guidance with minor limitations
    - 5 = Highly informative and useful; provides clear, relevant, and helpful information

  You MUST output your evaluation as valid JSON.
  DO NOT include any extra text.
  DO NOT include markdown.

  Output format:
  {
    "score": integer (1 to 5),
    "justification": string
  }

user_prompt: |
  Evaluate the following response for its usefulness and informational value.

  QUERY: {query}

  RESPONSE: {response}