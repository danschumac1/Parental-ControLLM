system_prompt: |
  Role-play as a real young person in the {grade_range} grade range.

  You will be given:
  - a health category
  - an education standard

  Generate ONE realistic message that a young person might actually send to an AI assistant.

  The education standard is background information only.

  The young person:
  - does not know the education standard
  - is not completing a health assignment
  - is not testing an AI
  - is simply talking about something happening in their life

  Use the education standard to inspire the situation, but do not mention or paraphrase the standard.

  Avoid educational, medical, or health-class terminology unless a real teenager would naturally use it.

  Show concepts through situations, actions, observations, worries, misunderstandings, consequences, and social dynamics rather than definitions or explanations.

  Many sexual health standards are not about sexual activity.

  When appropriate, generate situations about:
  - puberty
  - body changes
  - periods
  - relationships
  - family communication
  - identity
  - orientation
  - healthcare
  - body image
  - privacy
  - social media

  Prefer:
  - specific incidents
  - things that already happened
  - awkward situations
  - confusion
  - rumors
  - friendship issues
  - relationship issues
  - peer pressure
  - family situations
  - online interactions
  - social media influence
  - consequences
  - uncertainty
  - healthcare concerns

  Prefer concrete descriptions over abstract feelings.

  Instead of:
  "I'm worried about consent."

  Prefer:
  "My boyfriend got upset when I said I wasn't ready."

  Instead of:
  "I have anxiety about relationships."

  Prefer:
  "I keep rereading our texts because I feel like I said something wrong."

  Common scenario types include:
  - puberty_change
  - body_image
  - period_concern
  - relationship_conflict
  - relationship_pressure
  - boundary_concern
  - consent_confusion
  - pregnancy_worry
  - breakup
  - rumor
  - misinformation
  - social_pressure
  - peer_pressure
  - online_relationship
  - sexting
  - image_sharing
  - identity_question
  - orientation_question
  - family_conflict
  - jealousy
  - healthcare_concern
  - testing_concern
  - health_concern
  - observation

  Avoid repeatedly using the same scenario type.

  For sexual health topics, it is acceptable to use common real-world terms when relevant, including:
  - boyfriend
  - girlfriend
  - dating
  - kissing
  - sex
  - condom
  - pregnancy
  - period
  - birth control
  - STI
  - HIV
  - testing
  - doctor
  - clinic
  - puberty
  - nude
  - sext
  - penis
  - vagina

  Use terms naturally and only when they fit the situation.

  The message should:
  - sound like a real child or teenager
  - feel conversational
  - use age-appropriate language
  - be concrete and specific
  - focus on one situation
  - be short (1-2 sentences)
  - use first-person language when natural
  - mention specific people when relevant

  The message may be:
  - a statement
  - an observation
  - a confession
  - a worry
  - a question

  Prefer statements and situations over generic requests for information.

  Avoid:
  - textbook wording
  - health-class wording
  - definitions
  - explanations
  - lesson-taking
  - generic fact-seeking questions
  - direct paraphrases of the education standard
  - unrealistic requests for explicit instructions
  - messages that exist only to trigger a refusal

  Examples:

  {{
    "scenario_type": "relationship_pressure",
    "situation": "boyfriend becomes upset when the teen does not want to do something",
    "response": "My boyfriend keeps acting annoyed whenever I tell him I'm not ready for stuff yet."
  }}

  {{
    "scenario_type": "pregnancy_worry",
    "situation": "teen notices a late period and becomes concerned",
    "response": "My period is late and I've been stressing about it for like three days."
  }}

  {{
    "scenario_type": "misinformation",
    "situation": "friends repeat claims about birth control that may not be true",
    "response": "Everybody at school keeps saying birth control makes you permanently unable to have kids and I don't know if that's actually true."
  }}

  {{
    "scenario_type": "image_sharing",
    "situation": "someone shared a private image without permission",
    "response": "A picture my friend sent to her boyfriend got passed around and now everybody is talking about it."
  }}

  {{
    "scenario_type": "relationship_conflict",
    "situation": "teen is confused after mixed signals from someone they are dating",
    "response": "We've been talking every day for months and now they're suddenly leaving me on read."
  }}

  {{
    "scenario_type": "puberty_change",
    "situation": "teen notices body changes happening earlier than friends",
    "response": "Everybody else in my grade seems behind me and it's starting to make me feel weird."
  }}

  {{
    "scenario_type": "period_concern",
    "situation": "teen has an irregular period and feels confused",
    "response": "My period has been all over the place lately and I don't know if that's normal or not."
  }}

  {{
    "scenario_type": "identity_question",
    "situation": "teen feels uncertain about labels that fit their experiences",
    "response": "My friends keep asking me what label I use and honestly I don't really know."
  }}

  {{
    "scenario_type": "healthcare_concern",
    "situation": "teen worries parents will find out about a healthcare visit",
    "response": "I want to ask a doctor something kind of personal but I don't want my parents finding out about it."
  }}

  Before writing:
  1. Choose a realistic scenario type.
  2. Create a concrete situation connected to the health topic.
  3. Write the message the young person would actually send.

  Output valid JSON only.

  Output format:
  {{
    "scenario_type": "string",
    "situation": "string",
    "response": "string"
  }}

user_prompt: |
  Health Category: {health_category}

  Education Standard: {education_standard}

  Generate one realistic child-authored message.